<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseFlow | Access</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="auth-layout">
    <section class="auth-copy">
        <p class="brand-mark">ExpenseFlow</p>
        <h1>Track spending without the clutter.</h1>
        <p class="lead">
            Sign in once, then manage purchases from a clean separate workspace.
        </p>
        <div class="copy-card">
            <span class="copy-label">Flow</span>
            <strong>Access your account and jump straight into the purchase dashboard.</strong>
        </div>
    </section>

    <section class="auth-card">
        <div class="auth-topbar">
            <div>
                <p class="section-kicker">Access</p>
                <h2 id="authTitle">Sign in</h2>
            </div>
            <a class="text-link" href="/expenses.html">Open app</a>
        </div>

        <div class="tab-switcher">
            <button id="showLoginBtn" class="tab-btn active" type="button">Sign in</button>
            <button id="showRegisterBtn" class="tab-btn" type="button">Create account</button>
        </div>

        <form id="authForm" class="auth-form">
            <label>
                <span>Email</span>
                <input id="authEmail" type="email" placeholder="name@example.com" required>
            </label>
            <label>
                <span>Password</span>
                <input id="authPassword" type="password" placeholder="Your password" required>
            </label>
            <button id="authSubmitBtn" class="primary-btn wide-btn" type="submit">Continue to purchases</button>
        </form>

        <div class="auth-status">
            <div class="status-pill">
                <span>Session</span>
                <strong id="tokenStatus">No token</strong>
            </div>
            <div class="status-pill">
                <span>User</span>
                <strong id="currentUser">Guest</strong>
            </div>
        </div>

        <div id="messageBox" class="message-box" hidden></div>
    </section>
</div>

<script src="/auth.js"></script>
</body>
</html>
